<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>登录 / 注册 · tzblog</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/site-chrome.css" />
<meta name="robots" content="noindex" />
<style>
  :root{
    --bg:#0b0f14;--bg-2:#0f151c;--panel:#11171f;--panel-2:#141b24;
    --line:#1f2730;--line-2:#2a343f;--fg:#c9d4df;--fg-strong:#eef3f8;
    --muted:#6b7a89;--dim:#7d8a97;--acc:#3fe08f;--acc-dim:#1f7a4d;
    --danger:#e06a5a;--mono:'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace;
    --sans:'Noto Sans SC',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;--r:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--mono);font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh;display:grid;place-items:center;padding:24px;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:repeating-linear-gradient(to bottom,transparent 0 3px,rgba(0,0,0,.18) 3px 4px),radial-gradient(120% 80% at 50% -10%,rgba(63,224,143,.06),transparent 60%);opacity:.5;mix-blend-mode:soft-light}
  body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(rgba(107,122,137,.06) 1px,transparent 1px);background-size:22px 22px}
  a{color:inherit;text-decoration:none}

  .card{position:relative;z-index:1;width:100%;max-width:420px}
  .home{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);margin-bottom:16px;transition:.16s}
  .home::before{content:"←"}
  .home:hover{color:var(--acc)}
  .term{border:1px solid var(--line);border-radius:11px;background:linear-gradient(180deg,var(--panel),var(--bg-2));overflow:hidden;box-shadow:0 40px 100px -50px rgba(0,0,0,.9)}
  .term-bar{display:flex;align-items:center;gap:8px;padding:11px 15px;border-bottom:1px solid var(--line);background:var(--panel-2)}
  .dot{width:11px;height:11px;border-radius:50%}.dot.r{background:#ff5f57}.dot.y{background:#febc2e}.dot.g{background:#28c840}
  .term-title{margin-left:8px;color:var(--dim);font-size:12.5px}
  .body{padding:26px 28px 28px}
  .lead{color:var(--muted);font-size:13px;margin-bottom:18px}.lead .pr{color:var(--acc)}

  .tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:4px;margin-bottom:20px}
  .tabs button{font-family:var(--mono);font-size:13.5px;padding:9px;border:none;border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;transition:.16s}
  .tabs button.on{background:rgba(63,224,143,.1);color:var(--acc)}

  .oauth{display:flex;flex-direction:column;gap:9px;margin-bottom:18px}
  .oa{display:flex;align-items:center;gap:11px;width:100%;font-family:var(--mono);font-size:13.5px;padding:11px 14px;border:1px solid var(--line-2);border-radius:var(--r);background:var(--panel);color:var(--fg);cursor:pointer;transition:.16s;position:relative;overflow:hidden}
  .oa:hover{border-color:var(--acc-dim);background:var(--panel-2)}
  .oa .gi{width:18px;text-align:center;font-size:15px}
  .oa.pri{border-color:var(--acc-dim);background:rgba(63,224,143,.07)}
  .oa.pri .gi{color:var(--acc)}
  .oa .badge{margin-left:auto;font-size:10.5px;letter-spacing:.08em;color:var(--acc);border:1px solid var(--acc-dim);border-radius:4px;padding:1px 6px}

  .or{display:flex;align-items:center;gap:12px;color:var(--dim);font-size:11.5px;margin:6px 0 16px}
  .or::before,.or::after{content:"";flex:1;height:1px;background:var(--line)}

  .field{margin-bottom:13px}
  .field label{display:block;font-family:var(--sans);font-size:12.5px;color:var(--muted);margin-bottom:6px}
  .field input{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:var(--r);color:var(--fg-strong);font-family:var(--mono);font-size:13.5px;padding:10px 12px;transition:.16s}
  .field input:focus{outline:none;border-color:var(--acc-dim);box-shadow:0 0 0 3px rgba(63,224,143,.08)}
  .field input.bad{border-color:var(--danger)}
  .err{color:var(--danger);font-size:11.5px;min-height:1.2em;margin-top:4px;font-family:var(--sans)}
  .reg-only{display:none}
  body.reg .reg-only{display:block}
  body.reg .login-only{display:none}

  .row{display:flex;align-items:center;justify-content:space-between;margin:4px 0 18px;font-size:12.5px}
  .check{display:flex;align-items:center;gap:7px;color:var(--muted);cursor:pointer;font-family:var(--sans)}
  .check input{accent-color:var(--acc)}
  .row a{color:var(--muted)}.row a:hover{color:var(--acc)}

  .submit{width:100%;font-family:var(--mono);font-size:14px;font-weight:700;padding:12px;border:none;border-radius:var(--r);background:var(--acc);color:#06120b;cursor:pointer;transition:.16s;position:relative;overflow:hidden}
  .submit::before{content:"$ ";opacity:.55}
  .submit:hover{box-shadow:0 0 0 3px rgba(63,224,143,.2)}
  .magic{width:100%;margin-top:9px;font-family:var(--mono);font-size:13px;padding:11px;border:1px dashed var(--line-2);border-radius:var(--r);background:transparent;color:var(--muted);cursor:pointer;transition:.16s}
  .magic:hover{border-color:var(--acc-dim);color:var(--acc)}
  .note{font-family:var(--sans);font-size:11.5px;color:var(--dim);margin-top:18px;line-height:1.6;text-align:center}
  .ok{color:var(--acc);font-family:var(--mono);font-size:12.5px;min-height:1.4em;margin-top:12px;text-align:center}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="card">
  <a class="home" href="front-home.html">返回 tzblog</a>
  <div class="term">
    <div class="term-bar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="term-title">auth — haiden@tzblog</span>
    </div>
    <div class="body">
      <p class="lead"><span class="pr">$</span> <span id="cmd">ssh haiden@tzblog --login</span></p>

      <div class="tabs">
        <button id="tab-login" class="on" onclick="setMode('login')">登录</button>
  <button id="tab-reg" onclick="setMode('reg')">注册</button>
 </div>

      <div class="oauth">
        <button class="oa pri" data-msg="跳转 GitHub OAuth 授权…"><span class="gi">⌨</span> 使用 GitHub 继续 <span class="badge">推荐</span></button>
        <button class="oa" data-msg="跳转 Google OAuth 授权…"><span class="gi">G</span> 使用 Google 继续</button>
      </div>

      <div class="or">或使用邮箱</div>

 <form id="form" novalidate>
    <div class="field reg-only">
       <label>用户名</label>
          <input type="text" id="name" placeholder="haiden" autocomplete="username">
 <div class="err" data-for="name"></div>
        </div>
  <div class="field">
      <label>邮箱</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      <div class="err" data-for="email"></div>
        </div>
   <div class="field">
          <label>密码</label>
  <input type="password" id="pw" placeholder="至少 8 位" autocomplete="current-password">
          <div class="err" data-for="pw"></div>
        </div>
        <div class="field reg-only">
       <label>确认密码</label>
        <input type="password" id="pw2" placeholder="再输一次" autocomplete="new-password">
<div class="err" data-for="pw2"></div>
        </div>

        <div class="row login-only">
   <label class="check"><input type="checkbox" checked> 记住我</label>
          <a href="javascript:void(0)" data-msg="重置链接已发送到邮箱">忘记密码？</a>
        </div>
        <div class="row reg-only">
          <label class="check"><input type="checkbox" id="agree"> 我已阅读并同意服务条款</label>
     </div>

        <button type="submit" class="submit" id="submit">登录</button>
   <button type="button" class="magic" data-msg="一次性登录链接已发送，请查收邮箱">✉ 改用邮箱魔法链接登录</button>
        <div class="ok" id="ok"></div>
      </form>

    <p class="note">本站仅支持 GitHub / Google / 邮箱 / 魔法链接登录，不接入短信、微信、微博、QQ。匿名也可完整阅读全文。</p>
    </div>
  </div>
</div>

<script>
  var mode='login';
  function setMode(m){
    mode=m;document.body.classList.toggle('reg',m==='reg');
    document.getElementById('tab-login').classList.toggle('on',m==='login');
    document.getElementById('tab-reg').classList.toggle('on',m==='reg');
    document.getElementById('submit').textContent=m==='reg'?'创建账号':'登录';
 document.getElementById('cmd').textContent=m==='reg'?'useradd haiden --register':'ssh haiden@tzblog --login';
    document.getElementById('ok').textContent='';clearErrs();
  }
  function clearErrs(){document.querySelectorAll('.err').forEach(function(e){e.textContent='';});document.querySelectorAll('input').forEach(function(i){i.classList.remove('bad');});}
  function setErr(id,msg){var e=document.querySelector('.err[data-for="'+id+'"]');if(e)e.textContent=msg;var f=document.getElementById(id);if(f)f.classList.add('bad');}
  var emailRe=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  document.getElementById('form').addEventListener('submit',function(ev){
    ev.preventDefault();clearErrs();var ok=true;
    var email=document.getElementById('email').value.trim();
    var pw=document.getElementById('pw').value;
    if(!emailRe.test(email)){setErr('email','请输入有效的邮箱地址');ok=false;}
    if(pw.length<8){setErr('pw','密码至少 8 位');ok=false;}
    if(mode==='reg'){
      if(!document.getElementById('name').value.trim()){setErr('name','请填写用户名');ok=false;}
      if(document.getElementById('pw2').value!==pw){setErr('pw2','两次密码不一致');ok=false;}
      if(!document.getElementById('agree').checked){document.getElementById('ok').style.color='#e06a5a';document.getElementById('ok').textContent='请先同意服务条款';ok=false;}
    }
    if(!ok)return;
    document.getElementById('ok').style.color='#3fe08f';
    document.getElementById('ok').textContent=mode==='reg'?'✓ 账号创建成功，正在跳转…':'✓ 登录成功，正在跳转…';
  });
  document.querySelectorAll('[data-msg]').forEach(function(el){el.addEventListener('click',function(e){
    e.preventDefault();var t=document.createElement('div');t.textContent=el.dataset.msg;
    t.style.cssText='position:fixed;left:50%;bottom:32px;transform:translateX(-50%);background:#11171f;border:1px solid #2a343f;color:#3fe08f;font:13px/1.5 "JetBrains Mono",monospace;padding:10px 16px;border-radius:8px;z-index:99;box-shadow:0 12px 40px rgba(0,0,0,.5)';
    document.body.appendChild(t);setTimeout(function(){t.remove();},2000);
  });});
</script>
</body>
</html>
