<style>
:root{
  --bg:#0a0e14; --panel:#0f141c; --panel-2:#121821; --line:#1e2733;
  --fg:#d7e0ea; --fg-2:#9fb0c0; --muted:#5f7286; --faint:#3a4654;
  --green:#3fe08f; --green-dim:#1f7a4d; --amber:#e3b84e; --rose:#e36a6a;
  --mono:'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace;
  --sans:'Noto Sans SC',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg); color:var(--fg); font-family:var(--sans);
  font-size:14px; line-height:1.6; overflow:hidden;
  display:grid; grid-template-columns:212px 1fr;
}
body::before{
  content:""; position:fixed; inset:0; pointer-events:none; z-index:9999;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,0,0,.14) 3px);
  opacity:.35; mix-blend-mode:overlay;
}
a{color:inherit;text-decoration:none}
::selection{background:rgba(63,224,143,.25)}

/* ── nav ── */
.nav{
  background:var(--panel-2); border-right:1px solid var(--line);
  display:flex; flex-direction:column; height:100vh; position:sticky; top:0;
}
.nav-brand{
  font-family:var(--mono); font-weight:700; letter-spacing:.04em;
  padding:18px 18px 16px; border-bottom:1px solid var(--line); font-size:15px;
}
.nav-brand b{color:var(--green)}
.nav-grp{padding:14px 12px 4px}
.nav-grp-t{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);padding:0 8px 8px}
.nav-i{
  display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:7px;
  color:var(--fg-2); font-size:13px; position:relative; cursor:pointer; transition:.16s;
}
.nav-i:hover{background:var(--panel-2);color:var(--fg)}
.nav-i.on{background:rgba(63,224,143,.08);color:var(--fg)}
.nav-i.on::before{content:"";position:absolute;left:-12px;top:6px;bottom:6px;width:3px;border-radius:0 3px 3px 0;background:var(--green);box-shadow:0 0 8px var(--green)}
.nav-i .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5}
.nav-i.on .dot{background:var(--green);opacity:1;box-shadow:0 0 6px var(--green)}
.nav-foot{margin-top:auto;padding:14px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px}
.nav-foot .av{width:30px;height:30px;border-radius:8px;background:var(--panel-2);border:1px solid var(--line);display:grid;place-items:center;font-family:var(--mono);color:var(--green);font-weight:700;font-size:13px}
.nav-foot .who{font-size:12px}
.nav-foot .who span{display:block;color:var(--muted);font-size:11px;font-family:var(--mono)}

/* ── shell ── */
.main{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.bar{
  display:flex;align-items:center;gap:12px;padding:0 18px;height:54px;
  border-bottom:1px solid var(--line);background:var(--panel);flex-shrink:0;
}
.bar .crumb{font-family:var(--mono);font-size:12px;color:var(--muted)}
.bar .crumb b{color:var(--fg-2)}
.bar .crumb .green{color:var(--green)}
.bar .grow{flex:1}
.chip-stat{font-family:var(--mono);font-size:11px;color:var(--amber);display:flex;align-items:center;gap:6px}
.chip-stat .d{width:6px;height:6px;border-radius:50%;background:var(--amber);box-shadow:0 0 6px var(--amber)}
.btn{
  font-family:var(--sans);font-size:13px;border:1px solid var(--line);background:var(--panel-2);
  color:var(--fg-2);padding:7px 14px;border-radius:8px;cursor:pointer;transition:.16s;position:relative;overflow:hidden;
}
.btn:hover{border-color:var(--faint);color:var(--fg)}
.btn-pri{background:var(--green);border-color:var(--green);color:#06140d;font-weight:600}
.btn-pri:hover{background:#5ff0a8;color:#06140d}

/* toolbar */
.tools{display:flex;align-items:center;gap:4px;padding:7px 14px;border-bottom:1px solid var(--line);background:var(--panel-2);flex-shrink:0;flex-wrap:wrap}
.tbtn{
  font-family:var(--mono);font-size:12px;color:var(--fg-2);background:transparent;border:1px solid transparent;
  width:30px;height:30px;border-radius:6px;cursor:pointer;display:grid;place-items:center;transition:.14s;
}
.tbtn:hover{background:var(--panel);border-color:var(--line);color:var(--green)}
.tsep{width:1px;height:18px;background:var(--line);margin:0 5px}

/* editor split */
.work{flex:1;display:grid;grid-template-columns:1fr 1fr 268px;overflow:hidden}
.col{overflow:auto;border-right:1px solid var(--line)}
.col::-webkit-scrollbar{width:9px}
.col::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px}
.col-head{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);padding:12px 22px 6px;position:sticky;top:0;background:var(--bg);z-index:2}
.title-in{
  width:100%;background:transparent;border:none;color:var(--fg);font-family:var(--sans);font-weight:700;
  font-size:24px;line-height:1.3;padding:6px 22px 10px;outline:none;
}
.title-in::placeholder{color:var(--faint)}
.md{
  width:100%;min-height:calc(100% - 96px);background:transparent;border:none;outline:none;resize:none;
  color:var(--fg-2);font-family:var(--mono);font-size:13.5px;line-height:1.85;padding:4px 22px 60px;
}
.prev{padding:6px 26px 60px;font-size:15px;line-height:1.8;color:var(--fg)}
.prev h1{font-size:26px;font-weight:700;margin:22px 0 12px;color:var(--fg)}
.prev h2{font-size:20px;font-weight:700;margin:26px 0 10px;color:var(--fg);padding-left:12px;border-left:3px solid var(--green)}
.prev h3{font-size:16px;font-weight:600;margin:18px 0 8px;color:var(--fg-2)}
.prev p{margin:12px 0;color:var(--fg-2)}
.prev strong{color:var(--fg);font-weight:600}
.prev a{color:var(--green);border-bottom:1px solid var(--green-dim)}
.prev ul{margin:12px 0;padding-left:22px}
.prev li{margin:5px 0;color:var(--fg-2)}
.prev li::marker{color:var(--green)}
.prev code{font-family:var(--mono);font-size:.86em;background:var(--panel-2);color:var(--green);padding:2px 6px;border-radius:4px;border:1px solid var(--line)}
.prev pre{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px 16px;margin:14px 0;overflow:auto}
.prev pre code{background:none;border:none;color:var(--fg-2);padding:0}
.prev blockquote{border-left:3px solid var(--green-dim);background:rgba(63,224,143,.05);padding:8px 16px;margin:14px 0;color:var(--fg-2);border-radius:0 6px 6px 0}

/* meta sidebar */
.meta{overflow:auto;background:var(--panel);border-right:none}
.meta-sec{padding:16px 18px;border-bottom:1px solid var(--line)}
.meta-sec .lab{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:10px}
.status-row{display:flex;gap:6px}
.st{flex:1;text-align:center;font-size:12px;padding:7px 0;border-radius:7px;border:1px solid var(--line);color:var(--muted);cursor:pointer;transition:.14s;font-family:var(--mono)}
.st:hover{color:var(--fg-2)}
.st.on{background:rgba(227,184,78,.1);border-color:var(--amber);color:var(--amber)}
.st.pub.on{background:rgba(63,224,143,.1);border-color:var(--green);color:var(--green)}
.fld{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:7px;color:var(--fg);font-family:var(--sans);font-size:13px;padding:8px 11px;outline:none;transition:.14s}
.fld:focus{border-color:var(--green-dim)}
.fld::placeholder{color:var(--faint)}
.tagrow{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.tg{font-family:var(--mono);font-size:11px;color:var(--green);background:rgba(63,224,143,.08);border:1px solid var(--green-dim);padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:6px}
.tg b{color:var(--muted);cursor:pointer}
.tg b:hover{color:var(--rose)}
.cover{margin-top:4px;aspect-ratio:16/9;border:1px dashed var(--line);border-radius:8px;display:grid;place-items:center;color:var(--muted);font-family:var(--mono);font-size:12px;background:repeating-linear-gradient(45deg,transparent 0,transparent 9px,rgba(255,255,255,.015) 9px,rgba(255,255,255,.015) 18px);cursor:pointer;transition:.14s}
.cover:hover{border-color:var(--green-dim);color:var(--fg-2)}

/* status bar */
.stbar{display:flex;align-items:center;gap:20px;padding:0 22px;height:34px;border-top:1px solid var(--line);background:var(--panel);font-family:var(--mono);font-size:11px;color:var(--muted);flex-shrink:0}
.stbar .green{color:var(--green-dim)}
.stbar .grow{flex:1}

/* toast */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel);border:1px solid var(--green-dim);color:var(--green);font-family:var(--mono);font-size:13px;padding:10px 20px;border-radius:9px;opacity:0;pointer-events:none;transition:.3s;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:980px){
  body{grid-template-columns:1fr}
  .nav{display:none}
  .work{grid-template-columns:1fr}
  .col:nth-child(2),.meta{display:none}
}

## 为什么不是 Elasticsearch

Elasticsearch 很强，但对个人博客是**杀鸡用牛刀**：JVM 内存占用动辄 1G 起，运维成本高。Meilisearch 用 Rust 写的，单二进制、内存占用小，`docker run` 一条命令就跑起来。

> 选型原则：个人项目优先选「运维负担最小」而不是「功能上限最高」的方案。

## 接入只要三步

1. 起服务，建索引
2. 把文章 push 进去
3. 前端调搜索接口

```js
import { MeiliSearch } from 'meilisearch'
const client = new MeiliSearch({ host: 'http://127.0.0.1:7700' })
await client.index('posts').addDocuments(posts)
```

搜索时直接 `index.search(query)`，返回结果已经带好高亮片段，前端几乎不用处理。

## 中文分词的坑

默认分词对中文支持一般，需要在设置里调整 `separatorTokens`，并把标题、标签的搜索权重调高。调完之后，搜「缓存」能同时命中标题含「缓存」和正文提到缓存的文章。</textarea>

<script>
const md=document.getElementById('md'),prev=document.getElementById('prev');
const wc=document.getElementById('wc'),rt=document.getElementById('rt'),ln=document.getElementById('ln');

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function render(src){
  const blocks=src.split(/\n{2,}/);let out='';
  for(let b of blocks){
    b=b.trim();if(!b)continue;
    if(/^```/.test(b)){
      const body=b.replace(/^```\w*\n?/,'').replace(/```$/,'');
   out+='<pre><code>'+esc(body)+'</code></pre>';continue;
    }
    if(/^> /.test(b)){out+='<blockquote>'+inline(esc(b.replace(/^> ?/gm,'')))+'</blockquote>';continue;}
    if(/^### /.test(b)){out+='<h3>'+inline(esc(b.slice(4)))+'</h3>';continue;}
    if(/^## /.test(b)){out+='<h2>'+inline(esc(b.slice(3)))+'</h2>';continue;}
    if(/^# /.test(b)){out+='<h1>'+inline(esc(b.slice(2)))+'</h1>';continue;}
    if(/^(\d+\.|- )/.test(b)){
      const items=b.split('\n').map(l=>'<li>'+inline(esc(l.replace(/^(\d+\.|-)\s*/,'')))+'</li>').join('');
      out+='<ul>'+items+'</ul>';continue;
    }
    out+='<p>'+inline(esc(b)).replace(/\n/g,'<br>')+'</p>';
  }
  return out;
}
function inline(s){
  return s.replace(/`([^`]+)`/g,'<code>$1</code>')
          .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
       .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
}
function stats(){
  const t=md.value;
  const cn=(t.match(/[一-龥]/g)||[]).length;
  const en=(t.match(/[a-zA-Z]+/g)||[]).length;
  const total=cn+en;
  wc.textContent=total+' 字';
  rt.textContent='约 '+Math.max(1,Math.ceil(total/350))+' 分钟';
  ln.textContent=t.substr(0,md.selectionStart).split('\n').length;
}
function update(){prev.innerHTML=render(md.value);stats();}
md.addEventListener('input',update);
md.addEventListener('keyup',stats);md.addEventListener('click',stats);
update();

// toolbar insert
const wraps={bold:['**','**'],code:['`','`'],link:['[','](https://)'],h2:['## ',''],ul:['- ',''],quote:['> ',''],pre:['```js\n','\n```']};
document.getElementById('tools').addEventListener('click',e=>{
  const b=e.target.closest('[data-md]');if(!b)return;
  const [l,r]=wraps[b.dataset.md];const s=md.selectionStart,en2=md.selectionEnd;
  const sel=md.value.slice(s,en2)||(b.dataset.md==='link'?'链接文字':'');
  md.value=md.value.slice(0,s)+l+sel+r+md.value.slice(en2);
  md.focus();md.selectionStart=md.selectionEnd=s+l.length+sel.length;
  update();
});

// status toggle
document.querySelectorAll('.st').forEach(s=>s.addEventListener('click',()=>{
  document.querySelectorAll('.st').forEach(x=>x.classList.remove('on'));
  s.classList.add('on');
}));

// tags
const tagIn=document.getElementById('tagIn'),tags=document.getElementById('tags');
tagIn.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&tagIn.value.trim()){
  const sp=document.createElement('span');sp.className='tg';
    sp.innerHTML=tagIn.value.trim()+' <b data-x>×</b>';tags.appendChild(sp);tagIn.value='';
  }
});
tags.addEventListener('click',e=>{if(e.target.dataset.x!==undefined)e.target.closest('.tg').remove()});

// cover
document.querySelector('.cover').addEventListener('click',function(){this.textContent='cover-meilisearch.png ✓';this.style.color='var(--green)'});

// toast helper
const toast=document.getElementById('toast');
function flash(m){toast.textContent=m;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1800)}
document.getElementById('saveBtn').onclick=()=>{flash('✓ 草稿已保存');document.getElementById('saveState').textContent='草稿 · 刚刚保存'};
document.getElementById('pubBtn').onclick=()=>flash('✓ 已发布到 tzcode.top');

// autosave indicator
let t=0;md.addEventListener('input',()=>{clearTimeout(t);t=setTimeout(()=>document.getElementById('saveState').textContent='草稿 · 刚刚自动保存',1500)});
</script>
