<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>媒体库 · tzblog</title>
<style>
  :root{
    --bg:#0a0e14; --panel:#11161f; --panel-2:#0d1219; --line:#1d2530;
    --fg:#e4e8ee; --fg-2:#aab3c0; --muted:#6b7686; --faint:#46505e;
    --accent:#3fe08f; --accent-dim:#1f7a4d;
    --warn:#e8b339; --danger:#e06a5a; --info:#56a8e8;
    --mono:'SF Mono',ui-monospace,'JetBrains Mono',Menlo,monospace;
    --sans:'Noto Sans SC',-apple-system,BlinkMacSystemFont,'PingFang SC',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg); color:var(--fg); font-family:var(--sans); font-size:14px; line-height:1.6; -webkit-font-smoothing:antialiased; display:grid; grid-template-columns:232px 1fr; height:100vh; overflow:hidden}
  a{color:inherit;text-decoration:none}
  ::selection{background:rgba(63,224,143,.25)}

  .side{background:var(--panel-2); border-right:1px solid var(--line); display:flex; flex-direction:column; height:100vh; overflow-y:auto}
  .brand{padding:18px 20px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:9px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
  .brand b{font-family:var(--mono);font-size:14px;letter-spacing:.02em}
  .brand span{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .nav{padding:12px 12px;flex:1;display:flex;flex-direction:column;gap:2px}
  .nav .grp{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--faint);text-transform:uppercase;padding:14px 10px 6px}
  .nav a{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;color:var(--fg-2);font-size:13px;transition:.15s;position:relative}
  .nav a .ic{width:15px;text-align:center;font-family:var(--mono);font-size:13px;color:var(--muted)}
  .nav a:hover{background:var(--panel);color:var(--fg)}
  .nav a.on{background:rgba(63,224,143,.1);color:var(--fg)}
  .nav a.on .ic{color:var(--accent)}
  .nav a.on::before{content:"";position:absolute;left:-12px;top:7px;bottom:7px;width:2px;background:var(--accent);border-radius:2px;box-shadow:0 0 6px var(--accent)}
  .side .me{padding:12px 16px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .side .me .av{width:30px;height:30px;border-radius:7px;background:var(--panel);border:1px solid var(--line);display:grid;place-items:center;font-family:var(--mono);color:var(--accent);font-size:13px}
  .side .me .nm{font-size:13px}.side .me .rl{font-family:var(--mono);font-size:11px;color:var(--muted)}

  .main{display:flex;flex-direction:column;min-width:0;height:100vh;overflow-y:auto}
  .top{display:flex;align-items:center;justify-content:space-between;padding:14px 26px;border-bottom:1px solid var(--line);background:rgba(13,18,25,.7);backdrop-filter:blur(8px);position:sticky;top:0;z-index:5}
  .top .crumb{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .top .crumb b{color:var(--fg-2);font-weight:400}
  .top .acts{display:flex;gap:10px;align-items:center}
  .btn{font-family:var(--mono);font-size:12.5px;padding:7px 13px;border-radius:7px;border:1px solid var(--line);background:var(--panel);color:var(--fg-2);cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px;position:relative;overflow:hidden}
  .btn:hover{border-color:var(--faint);color:var(--fg)}
  .btn.primary{background:rgba(63,224,143,.12);border-color:var(--accent-dim);color:var(--accent)}
  .btn.primary:hover{background:rgba(63,224,143,.18)}
  .wrap{padding:24px 26px 40px;max-width:1180px;width:100%}

  /* storage usage */
  .usage{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:16px 18px;margin-bottom:18px;display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .usage .lab{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:6px}
  .usage .big{font-family:var(--mono);font-size:20px;font-weight:600}
  .usage .big small{font-size:13px;color:var(--fg-2);font-weight:400}
  .usage .barwrap{flex:1;min-width:200px}
  .usage .track{height:8px;border-radius:5px;background:var(--panel-2);overflow:hidden;margin-top:8px}
  .usage .track .fill{height:100%;width:34%;border-radius:5px;background:linear-gradient(90deg,var(--accent-dim),var(--accent));box-shadow:0 0 8px rgba(63,224,143,.3)}
  .usage .seg{display:flex;gap:14px;font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:8px}
  .usage .seg i{font-style:normal;color:var(--fg-2)}

  /* dropzone */
  .drop{border:1.5px dashed var(--line);border-radius:11px;padding:22px;text-align:center;margin-bottom:20px;transition:.15s;cursor:pointer;background:var(--panel-2)}
  .drop:hover{border-color:var(--accent-dim);background:rgba(63,224,143,.04)}
  .drop .ic{font-family:var(--mono);font-size:22px;color:var(--accent)}
  .drop .t{font-size:13px;color:var(--fg-2);margin-top:6px}
  .drop .s{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px}

  /* filters */
  .filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .chip{font-family:var(--mono);font-size:12px;padding:5px 12px;border-radius:7px;border:1px solid var(--line);background:var(--panel);color:var(--muted);cursor:pointer;transition:.15s}
  .chip:hover{color:var(--fg);border-color:var(--faint)}
  .chip.on{color:var(--accent);border-color:var(--accent-dim);background:rgba(63,224,143,.1)}

  /* grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(184px,1fr));gap:14px}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;transition:.15s;cursor:pointer}
  .tile:hover{border-color:var(--accent-dim);transform:translateY(-2px)}
  .tile .thumb{height:118px;position:relative;display:grid;place-items:center;border-bottom:1px solid var(--line)}
  .tile .thumb .ty{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.85);position:absolute;top:8px;left:8px;background:rgba(0,0,0,.35);padding:2px 7px;border-radius:5px;backdrop-filter:blur(4px)}
  .tile .thumb .ext{font-family:var(--mono);font-size:13px;color:rgba(255,255,255,.92);letter-spacing:.04em}
  .tile .meta{padding:9px 11px}
  .tile .fn{font-family:var(--mono);font-size:11.5px;color:var(--fg-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tile .sub{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:4px}
  .tile .ops{display:flex;gap:6px;padding:0 11px 11px}
  .tile .ops button{flex:1;font-family:var(--mono);font-size:10.5px;padding:4px;border-radius:5px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;transition:.15s}
  .tile .ops button:hover{color:var(--accent);border-color:var(--accent-dim)}
  .tile .ops button.del:hover{color:var(--danger);border-color:rgba(224,106,90,.4)}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel);border:1px solid var(--accent-dim);color:var(--accent);font-family:var(--mono);font-size:12.5px;padding:9px 16px;border-radius:8px;opacity:0;pointer-events:none;transition:.25s;z-index:20}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:880px){body{grid-template-columns:1fr}.side{position:fixed;left:-232px;z-index:30;transition:.2s}.side.open{left:0}}
</style>
<link rel="stylesheet" href="assets/admin-chrome.css">
<script src="assets/admin-chrome.js" defer></script>
<meta name="robots" content="noindex, nofollow">
</head>
<body>
  <aside class="side">
    <div class="brand"><span class="dot"></span><b>tzblog</b><span>/admin</span></div>
    <nav class="nav">
      <div class="grp">概览</div>
      <a href="admin-dashboard.html"><span class="ic">▦</span>仪表盘</a>
      <a href="admin-analytics.html"><span class="ic">∿</span>数据分析</a>
      <div class="grp">内容</div>
      <a href="admin-editor.html"><span class="ic">✎</span>写文章</a>
      <a class="on" href="admin-media.html"><span class="ic">⊞</span>媒体库</a>
      <div class="grp">系统</div>
      <a href="admin-settings.html"><span class="ic">⚙</span>站点设置</a>
      <a href="front-home.html"><span class="ic">↗</span>查看前台</a>
    </nav>
    <div class="me"><span class="av">H</span><div><div class="nm">haiden</div><div class="rl">站长</div></div></div>
  </aside>

  <div class="main">
    <header class="top">
      <div class="crumb">admin ❯ <b>media</b></div>
      <div class="acts">
        <button class="btn" onclick="toast('已复制 CDN 基址 cdn.tzcode.top')">⎘ CDN 基址</button>
        <button class="btn primary" onclick="toast('选择文件上传…')">＋ 上传素材</button>
      </div>
    </header>

    <div class="wrap">
      <div class="usage">
        <div><div class="lab">存储用量</div><div class="big">1.34<small> GB</small> <small style="color:var(--muted)">/ 4 GB</small></div></div>
        <div class="barwrap">
          <div class="track"><div class="fill"></div></div>
          <div class="seg"><span>图片 <i>1.02 GB</i></span><span>SVG <i>86 MB</i></span><span>其他 <i>238 MB</i></span><span>共 <i>142 个文件</i></span></div>
        </div>
      </div>

      <div class="drop" onclick="toast('选择文件上传…')">
        <div class="ic">↥</div>
        <div class="t">拖拽文件到此处，或点击选择</div>
        <div class="s">支持 PNG / JPG / WebP / SVG · 单文件 ≤ 10 MB · 自动转 WebP 并生成多尺寸</div>
      </div>

      <div class="filters" id="filters">
        <span class="chip on" data-f="all">全部 142</span>
        <span class="chip" data-f="cover">文章封面 48</span>
        <span class="chip" data-f="shot">截图 61</span>
        <span class="chip" data-f="diagram">图表 / SVG 24</span>
        <span class="chip" data-f="other">其他 9</span>
      </div>

      <div class="grid" id="grid"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
<script>
  var media=[
    {fn:'spec-first-cover.webp',ty:'封面',f:'cover',ext:'WEBP',dim:'1600×900',sz:'182 KB',c1:'#14323a',c2:'#0e1f26'},
    {fn:'rsc-cache-flow.svg',ty:'图表',f:'diagram',ext:'SVG',dim:'矢量',sz:'24 KB',c1:'#1a2b3d',c2:'#0f1a26'},
    {fn:'go-flamegraph.png',ty:'截图',f:'shot',ext:'PNG',dim:'2048×1280',sz:'612 KB',c1:'#2a1f14',c2:'#1c1410'},
    {fn:'ghostty-terminal.webp',ty:'封面',f:'cover',ext:'WEBP',dim:'1600×900',sz:'201 KB',c1:'#0f2a1e',c2:'#0a1c14'},
    {fn:'meilisearch-arch.svg',ty:'图表',f:'diagram',ext:'SVG',dim:'矢量',sz:'31 KB',c1:'#241a33',c2:'#16101f'},
    {fn:'blog-100-cover.jpg',ty:'封面',f:'cover',ext:'JPG',dim:'1600×900',sz:'258 KB',c1:'#33261a',c2:'#1f1710'},
    {fn:'docker-layers.png',ty:'截图',f:'shot',ext:'PNG',dim:'1920×1080',sz:'487 KB',c1:'#14283a',c2:'#0d1925'},
    {fn:'rsc-waterfall.png',ty:'截图',f:'shot',ext:'PNG',dim:'2048×1024',sz:'556 KB',c1:'#1f1432',c2:'#140d20'},
    {fn:'zsh-config-diff.png',ty:'截图',f:'shot',ext:'PNG',dim:'1680×1050',sz:'398 KB',c1:'#0f2a2a',c2:'#0a1c1c'},
    {fn:'katex-render.svg',ty:'图表',f:'diagram',ext:'SVG',dim:'矢量',sz:'18 KB',c1:'#2a1422',c2:'#1c0d16'},
    {fn:'avatar-haiden.png',ty:'其他',f:'other',ext:'PNG',dim:'512×512',sz:'46 KB',c1:'#1a2333',c2:'#111824'},
    {fn:'og-default.webp',ty:'其他',f:'other',ext:'WEBP',dim:'1200×630',sz:'94 KB',c1:'#14323a',c2:'#0e1f26'}
  ];
  var grid=document.getElementById('grid');
  function render(f){
    grid.innerHTML=media.filter(function(m){return f==='all'||m.f===f}).map(function(m){
      return '<div class="tile">'
        +'<div class="thumb" style="background:linear-gradient(135deg,'+m.c1+','+m.c2+')"><span class="ty">'+m.ty+'</span><span class="ext">'+m.ext+'</span></div>'
        +'<div class="meta"><div class="fn">'+m.fn+'</div><div class="sub"><span>'+m.dim+'</span><span>'+m.sz+'</span></div></div>'
        +'<div class="ops"><button onclick="toast(\'已复制 URL：cdn.tzcode.top/'+m.fn+'\')">复制 URL</button><button class="del" onclick="toast(\'已删除 '+m.fn+'\')">删除</button></div>'
        +'</div>';
    }).join('');
  }
  render('all');
  document.querySelectorAll('.chip').forEach(function(c){c.addEventListener('click',function(){document.querySelectorAll('.chip').forEach(function(x){x.classList.remove('on')});this.classList.add('on');render(this.dataset.f);});});

  var t=document.getElementById('toast'),tm;
  function toast(m){t.textContent=m;t.classList.add('show');clearTimeout(tm);tm=setTimeout(function(){t.classList.remove('show')},1800);}
  document.querySelectorAll('.btn').forEach(function(el){el.addEventListener('click',function(e){var r=document.createElement('span');var dd=Math.max(el.offsetWidth,el.offsetHeight);var x=e.clientX-el.getBoundingClientRect().left-dd/2,y=e.clientY-el.getBoundingClientRect().top-dd/2;r.style.cssText='position:absolute;border-radius:50%;width:'+dd+'px;height:'+dd+'px;left:'+x+'px;top:'+y+'px;background:radial-gradient(circle,rgba(63,224,143,.4),transparent 70%);transform:scale(0);animation:rp .5s ease-out;pointer-events:none';el.appendChild(r);setTimeout(function(){r.remove()},500);});});
  var st=document.createElement('style');st.textContent='@keyframes rp{to{transform:scale(2.2);opacity:0}}';document.head.appendChild(st);
</script>
</body>
</html>
