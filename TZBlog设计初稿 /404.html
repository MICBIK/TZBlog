<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 · 页面走失了 — tzblog</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0b0f14;--bg-2:#0f151c;--panel:#11171f;--panel-2:#141b24;--line:#1f2730;--line-2:#2a343f;
    --fg:#c9d4df;--fg-strong:#eef3f8;--muted:#6b7a89;--dim:#7d8a97;--acc:#3fe08f;--acc-dim:#1f7a4d;--amber:#e3b341;
    --mono:'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace;--sans:'Noto Sans SC',-apple-system,system-ui,sans-serif;--r:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--mono);font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:repeating-linear-gradient(to bottom,transparent 0 3px,rgba(0,0,0,.18) 3px 4px),radial-gradient(120% 80% at 50% -10%,rgba(63,224,143,.05),transparent 60%);opacity:.5;mix-blend-mode:soft-light}
  .wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 24px;width:100%}
  a{color:inherit;text-decoration:none}
  .topbar{position:sticky;top:0;z-index:20;background:rgba(11,15,20,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .topbar .wrap{display:flex;align-items:center;gap:22px;height:56px}
  .prompt{color:var(--acc);font-weight:700;white-space:nowrap}.prompt .path{color:var(--fg-strong)}
  .nav{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
  .nav a{padding:6px 11px;border-radius:var(--r);color:var(--muted);font-size:13.5px;transition:.16s}
  .nav a::before{content:"./";color:var(--dim)}
  .nav a:hover{color:var(--fg-strong);background:var(--panel-2)}
  main{flex:1;display:grid;place-items:center;padding:60px 0}
  .term{border:1px solid var(--line);border-radius:10px;background:linear-gradient(180deg,var(--panel),var(--bg-2));overflow:hidden;box-shadow:0 30px 80px -40px rgba(0,0,0,.8);width:min(620px,100%)}
  .term-bar{display:flex;align-items:center;gap:8px;padding:11px 15px;border-bottom:1px solid var(--line);background:var(--panel-2)}
  .dot{width:11px;height:11px;border-radius:50%}.dot.r{background:#ff5f57}.dot.y{background:#febc2e}.dot.g{background:#28c840}
  .term-title{margin-left:8px;color:var(--dim);font-size:12.5px}
  .term-body{padding:30px}
  .big{font-family:var(--sans);font-weight:700;font-size:clamp(64px,14vw,120px);line-height:1;color:var(--fg-strong);letter-spacing:-.02em}
  .big span{color:var(--acc)}
  .cmd{color:var(--muted);font-size:13.5px;margin:18px 0 4px}.cmd .pr{color:var(--acc)}.cmd .arg{color:var(--amber)}
  .err{color:#ff7b9c;font-size:13.5px;margin-bottom:20px}
  .lead{font-family:var(--sans);color:var(--fg);font-size:15px;max-width:48ch;opacity:.85;margin-bottom:24px}
  .cta{display:flex;gap:10px;flex-wrap:wrap}
  .btn{font-family:var(--mono);font-size:13.5px;padding:10px 18px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;transition:.16s}
  .btn-go{background:var(--acc);color:#06120b;font-weight:700}.btn-go::before{content:"$ ";opacity:.6}
  .btn-go:hover{box-shadow:0 0 0 3px rgba(63,224,143,.18)}
  .btn-ghost{border-color:var(--line-2);color:var(--fg)}.btn-ghost:hover{border-color:var(--acc-dim);color:var(--acc)}
  .cursor{display:inline-block;width:9px;height:1.05em;background:var(--acc);vertical-align:-2px;animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  @media(prefers-reduced-motion:reduce){.cursor{animation:none}}
</style>
<link rel="stylesheet" href="assets/site-chrome.css" />
<script defer src="assets/site-chrome.js"></script>
</head>
<body data-no-footer>
<header class="topbar"><div class="wrap">
  <span class="prompt">haiden@tzblog:<span class="path">~</span> $</span>
  <nav class="nav"><a href="front-home.html">home</a><a href="front-search.html">search</a><a href="archive.html">archive</a><a href="front-about.html">about</a></nav>
</div></header>

<main><div class="wrap" style="display:grid;place-items:center">
  <div class="term">
    <div class="term-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="term-title">~ — zsh — 404</span></div>
    <div class="term-body">
      <div class="big">4<span>0</span>4</div>
      <p class="cmd"><span class="pr">$</span> cat <span class="arg" id="reqpath">requested-page</span></p>
    <p class="err">zsh: no such file or directory — 你要找的页面走失了。</p>
      <p class="lead">它可能被归档、改名，或从未存在过。下面几条命令也许有用：</p>
  <div class="cta">
        <a class="btn btn-go" href="front-home.html">cd ~/home</a>
   <a class="btn btn-ghost" href="front-search.html">grep 全站搜索</a>
 <a class="btn btn-ghost" href="archive.html">ls 归档</a>
   </div>
    </div>
  </div>
</div></main>

<script>
  // surface the path the visitor actually hit, if any
  try{var p=new URLSearchParams(location.search).get('from')||document.referrer||location.pathname;document.getElementById('reqpath').textContent=p.slice(0,60)||'requested-page';}catch(e){}
</script>
</body>
</html>
