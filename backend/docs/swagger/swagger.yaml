  github_com_MICBIK_TZBlog_backend_internal_domain_article.Article:
    properties:
      author:
        allOf:
        - $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_domain_user.User'
        description: Relations (not stored in DB, loaded separately)
      authorId:
        type: integer
      categoryId:
        type: integer
      commentCount:
        type: integer
      content:
        type: string
      coverImage:
        type: string
      createdAt:
        type: string
      deletedAt:
        type: string
      id:
        type: integer
      likeCount:
        type: integer
      publishedAt:
        type: string
      readingTime:
        description: in minutes
        type: integer
      slug:
        type: string
      status:
        description: draft, published, archived
        type: string
      summary:
        type: string
      tags:
        items:
          $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_domain_tag.Tag'
        type: array
      title:
        type: string
      updatedAt:
        type: string
      viewCount:
        type: integer
    type: object
  github_com_MICBIK_TZBlog_backend_internal_domain_article.CreateArticleDTO:
    properties:
      content:
        type: string
      cover_image:
        type: string
      status:
        enum:
        - draft
        - published
        type: string
      summary:
        type: string
      title:
        maxLength: 200
        type: string
    required:
    - content
    - status
    - title
    type: object
  github_com_MICBIK_TZBlog_backend_internal_domain_article.UpdateArticleDTO:
    properties:
      content:
        type: string
      cover_image:
        type: string
      status:
        enum:
        - draft
        - published
        - archived
        type: string
      summary:
        type: string
      title:
        maxLength: 200
        type: string
    type: object
  github_com_MICBIK_TZBlog_backend_internal_domain_category.Category:
    properties:
      createdAt:
        type: string
      deletedAt:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      slug:
        type: string
      updatedAt:
        type: string
    type: object
  github_com_MICBIK_TZBlog_backend_internal_domain_comment.Comment:
    properties:
      articleId:
        type: integer
      content:
        type: string
      createdAt:
        type: string
      deletedAt:
        type: string
      id:
        type: integer
      parentId:
        type: integer
      status:
        description: published, pending, deleted
        type: string
      updatedAt:
        type: string
      userId:
        type: integer
    type: object
  github_com_MICBIK_TZBlog_backend_internal_domain_comment.CreateCommentDTO:
    properties:
      article_id:
        type: integer
      content:
        maxLength: 1000
        type: string
      parent_id:
        type: integer
    required:
    - article_id
    - content
    type: object
  github_com_MICBIK_TZBlog_backend_internal_domain_comment.UpdateCommentDTO:
    properties:
      content:
        maxLength: 1000
        type: string
    required:
    - content
    type: object
  github_com_MICBIK_TZBlog_backend_internal_domain_payment.Membership:
    properties:
      createdAt:
        type: string
      endDate:
        type: string
      id:
        type: integer
      startDate:
        type: string
      status:
        description: active, canceled, expired
        type: string
      stripeSubscriptionId:
        type: string
      tier:
        $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_domain_payment.MembershipTier'
      updatedAt:
        type: string
      userId:
        type: integer
    type: object
  github_com_MICBIK_TZBlog_backend_internal_domain_payment.MembershipTier:
    enum:
    - free
    - basic
    - premium
    - lifetime
    type: string
    x-enum-varnames:
    - TierFree
    - TierBasic
    - TierPremium
    - TierLifetime
  github_com_MICBIK_TZBlog_backend_internal_domain_tag.Tag:
    properties:
      createdAt:
        type: string
      deletedAt:
        type: string
      id:
        type: integer
      name:
        type: string
      slug:
        type: string
      updatedAt:
        type: string
    type: object
  github_com_MICBIK_TZBlog_backend_internal_domain_user.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_domain_user.User'
    type: object
  github_com_MICBIK_TZBlog_backend_internal_domain_user.ChangePasswordDTO:
    properties:
      current_password:
        type: string
      new_password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  github_com_MICBIK_TZBlog_backend_internal_domain_user.LoginDTO:
    properties:
      login:
        type: string
      password:
        type: string
    required:
    - login
    - password
    type: object
  github_com_MICBIK_TZBlog_backend_internal_domain_user.RegisterDTO:
    properties:
      email:
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  github_com_MICBIK_TZBlog_backend_internal_domain_user.UpdateProfileDTO:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      display_name:
        type: string
    type: object
  github_com_MICBIK_TZBlog_backend_internal_domain_user.User:
    properties:
      avatarUrl:
        type: string
      bio:
        type: string
      createdAt:
        type: string
      deletedAt:
        type: string
      displayName:
        type: string
      email:
        type: string
      id:
        type: integer
      isVerified:
        type: boolean
      lastLoginAt:
        type: string
      role:
        type: string
      status:
        type: string
      updatedAt:
        type: string
      username:
        type: string
    type: object
  github_com_MICBIK_TZBlog_backend_internal_search.ArticleDocument:
    properties:
      author:
        type: string
      category:
        type: string
      content:
        type: string
      id:
        type: string
      publishedAt:
        type: integer
      slug:
        type: string
      summary:
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        type: string
      viewCount:
        type: integer
    type: object
  github_com_MICBIK_TZBlog_backend_internal_search.SearchResult:
    properties:
      estimatedTotalHits:
        type: integer
      hits:
        items:
          $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_search.ArticleDocument'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      processingTimeMs:
        type: integer
      query:
        type: string
    type: object
  github_com_MICBIK_TZBlog_backend_internal_seo.MetaTags:
    properties:
      author:
        type: string
      description:
        type: string
      image:
        type: string
      keywords:
        type: string
      publishedAt:
        type: string
      title:
        type: string
      type:
        type: string
      updatedAt:
        type: string
      url:
        type: string
    type: object
  github_com_MICBIK_TZBlog_backend_internal_seo.OpenGraphTags:
    properties:
      ogDescription:
        type: string
      ogImage:
        type: string
      ogSiteName:
        type: string
      ogTitle:
        type: string
      ogType:
        type: string
      ogUrl:
        type: string
    type: object
  github_com_MICBIK_TZBlog_backend_internal_seo.SEOData:
    properties:
      canonical:
        type: string
      meta:
        $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_seo.MetaTags'
      openGraph:
        $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_seo.OpenGraphTags'
      structured: {}
      twitter:
        $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_seo.TwitterCardTags'
    type: object
  github_com_MICBIK_TZBlog_backend_internal_seo.TwitterCardTags:
    properties:
      twitterCard:
        type: string
      twitterCreator:
        type: string
      twitterDescription:
        type: string
      twitterImage:
        type: string
      twitterSite:
        type: string
      twitterTitle:
        type: string
    type: object
  internal_api_handlers.CreateCheckoutRequest:
    properties:
      tier:
        enum:
        - basic
        - premium
        - lifetime
        type: string
    required:
    - tier
    type: object
  internal_api_handlers.SubscribeRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
host: localhost:8080
info:
  contact:
    email: support@tzblog.com
    name: API Support
  description: TZBlog 后端 API 文档
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: TZBlog API
  version: "1.0"
paths:
  /api/v1/articles:
    get:
      consumes:
      - application/json
      description: 分页获取文章列表，支持多种筛选条件
      parameters:
      - description: 文章状态
        enum:
        - draft
        - published
        - archived
        example: published
        in: query
        name: status
        type: string
      - description: 作者 ID
        example: 1
        in: query
        name: author_id
        type: integer
      - description: 分类 ID
        example: 1
        in: query
        name: category_id
        type: integer
      - description: 标签 ID
        example: 1
        in: query
        name: tag_id
        type: integer
      - description: 搜索关键词
        example: '"golang"'
        in: query
        name: search
        type: string
      - default: 1
        description: 页码
        example: 1
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        example: 20
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回文章列表
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.PaginatedResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
      summary: 获取文章列表
      tags:
      - Articles
    post:
      consumes:
      - application/json
      description: 创建新文章（需要登录）
      parameters:
      - description: 文章数据
        in: body
        name: article
        required: true
        schema:
          $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_domain_article.CreateArticleDTO'
      produces:
      - application/json
      responses:
        "201":
          description: 创建成功
          schema:
            allOf:
            - $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_domain_article.Article'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
        "409":
          description: 文章 slug 已存在
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 创建文章
      tags:
      - Articles
  /api/v1/articles/{id}:
    delete:
      consumes:
      - application/json
      description: 删除文章（需要是作者本人或管理员）
      parameters:
      - description: 文章 ID
        example: 1
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.SuccessResponse'
        "400":
          description: 无效的文章 ID
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
        "403":
          description: 无权限删除此文章
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
        "404":
          description: 文章不存在
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 删除文章
      tags:
      - Articles
    get:
      consumes:
      - application/json
      description: 通过文章 ID 获取文章详情
      parameters:
      - description: 文章 ID
        example: 1
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回文章
          schema:
            allOf:
            - $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_domain_article.Article'
              type: object
        "400":
          description: 无效的文章 ID
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
        "404":
          description: 文章不存在
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
      summary: 根据 ID 获取文章
      tags:
      - Articles
    put:
      consumes:
      - application/json
      description: 更新已有文章（需要是作者本人）
      parameters:
      - description: 文章 ID
        example: 1
        in: path
        name: id
        required: true
        type: integer
      - description: 更新的文章数据
        in: body
        name: article
        required: true
        schema:
          $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_domain_article.UpdateArticleDTO'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            allOf:
            - $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_domain_article.Article'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
        "403":
          description: 无权限修改此文章
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
        "404":
          description: 文章不存在
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 更新文章
      tags:
      - Articles
  /api/v1/articles/slug/{slug}:
    get:
      consumes:
      - application/json
      description: 通过文章 slug 获取文章详情
      parameters:
      - description: 文章 slug
        example: '"my-first-post"'
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回文章
          schema:
            allOf:
            - $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_domain_article.Article'
              type: object
        "400":
          description: 文章 slug 为空
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
        "404":
          description: 文章不存在
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
      summary: 根据 slug 获取文章
      tags:
      - Articles
  /api/v1/auth/change-password:
    post:
      consumes:
      - application/json
      description: 修改已登录用户的密码
      parameters:
      - description: 密码信息
        in: body
        name: passwords
        required: true
        schema:
          $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_domain_user.ChangePasswordDTO'
      produces:
      - application/json
      responses:
        "200":
          description: 密码修改成功
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.SuccessResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
        "401":
          description: 未认证或旧密码错误
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 修改密码
      tags:
      - Auth
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: 使用邮箱和密码登录，返回 JWT token
      parameters:
      - description: 登录凭证
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_domain_user.LoginDTO'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            allOf:
            - $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_domain_user.AuthResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
        "401":
          description: 用户名或密码错误" example({"success":false,"error":"Invalid email or
            password","code":"INVALID_CREDENTIALS"})
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
      summary: 用户登录
      tags:
      - Auth
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: 登出当前用户（客户端需删除 token）
      produces:
      - application/json
      responses:
        "200":
          description: 登出成功
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.SuccessResponse'
      security:
      - BearerAuth: []
      summary: 用户登出
      tags:
      - Auth
  /api/v1/auth/me:
    get:
      consumes:
      - application/json
      description: 获取已登录用户的个人资料
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回用户信息
          schema:
            allOf:
            - $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_domain_user.User'
              type: object
        "401":
          description: 未认证" example({"success":false,"error":"Authentication required","code":"UNAUTHORIZED"})
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取当前用户信息
      tags:
      - Auth
  /api/v1/auth/profile:
    put:
