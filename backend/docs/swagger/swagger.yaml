      page:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
  github_com_MICBIK_TZBlog_backend_internal_api_response.PaginatedResponse:
    properties:
      data: {}
      metadata:
        $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.Metadata'
      success:
        type: boolean
    type: object
  github_com_MICBIK_TZBlog_backend_internal_api_response.Response:
    properties:
      data: {}
      error:
        $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.Error'
      metadata:
        $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.Metadata'
