basePath: /api/v1
definitions:
  gin.H:
    additionalProperties: {}
    type: object
  github_com_MICBIK_TZBlog_backend_internal_api_response.Error:
    properties:
      code:
        type: string
      details: {}
      message:
        type: string
    type: object
  github_com_MICBIK_TZBlog_backend_internal_api_response.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/github_com_MICBIK_TZBlog_backend_internal_api_response.Error'
      success:
        type: boolean
    type: object
  github_com_MICBIK_TZBlog_backend_internal_api_response.Metadata:
    properties:
      limit:
