          description: Upload config
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  properties:
                    allowedTypes:
                      items:
                        type: string
                      type: array
                    maxSize:
                      type: integer
                  type: object
              type: object
      summary: Get upload configuration
      tags:
      - Upload
  /api/v1/uploads/images:
    post:
      consumes:
      - multipart/form-data
      description: Upload an image file to Cloudflare R2 (jpg, png, gif, webp)
      parameters:
      - description: Image file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Upload successful
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  properties:
                    filename:
                      type: string
                    size:
                      type: integer
                    url:
                      type: string
                  type: object
              type: object
        "400":
