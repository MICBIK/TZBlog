          description: 服务器错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: 获取标签列表
      tags:
      - Tags
    post:
      consumes:
      - application/json
      description: 创建新标签（需要管理员权限）
      parameters:
      - description: 标签数据
        in: body
        name: tag
        required: true
        schema:
          $ref: '#/definitions/tag.Tag'
      produces:
      - application/json
      responses:
        "201":
          description: 创建成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/tag.Tag'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: 标签已存在
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 创建标签
      tags:
      - Tags
  /api/v1/tags/{id}:
    get:
      consumes:
      - application/json
      description: 通过标签 ID 获取标签详情
      parameters:
      - description: 标签 ID
        example: 1
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回标签
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/tag.Tag'
