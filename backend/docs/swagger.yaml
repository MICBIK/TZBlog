            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: 标签不存在
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
