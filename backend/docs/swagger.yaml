  /system/log-level:
    get:
      description: Returns the current application log level
      produces:
      - application/json
      responses:
        "200":
          description: Current log level
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get current log level
      tags:
      - system
    put:
      consumes:
      - application/json
      description: Changes the application log level at runtime
      parameters:
      - description: Log level (debug, info, warn, error)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.SetLogLevelRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Log level updated successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Set log level dynamically
      tags:
      - system
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
